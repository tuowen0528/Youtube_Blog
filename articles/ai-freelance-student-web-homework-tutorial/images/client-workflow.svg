<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">AI 接单流程示意图</title>
  <desc id="desc">从找需求、确认任务、AI 开发、远程协作、打包交付到收款复盘的流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f7f3"/>
      <stop offset="1" stop-color="#eef6f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0d1f1a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1536" height="864" rx="48" fill="url(#bg)"/>
  <g transform="translate(96 96)">
    <text x="0" y="0" fill="#15231f" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="48" font-weight="800">不是卖思路，是交付一个完整过程</text>
    <text x="0" y="54" fill="#5d6b66" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="24">把零散需求整理成可以执行、可以验收、可以复盘的网页修改流程。</text>
  </g>
  <g font-family="Arial,'Microsoft YaHei',sans-serif" filter="url(#shadow)">
    <g transform="translate(96 222)">
      <rect width="290" height="170" rx="28" fill="#ffffff"/>
      <circle cx="58" cy="64" r="28" fill="#e8f5ef"/>
      <path d="M47 64h22M58 53v22" stroke="#0f9b74" stroke-width="8" stroke-linecap="round"/>
      <text x="36" y="124" fill="#15231f" font-size="30" font-weight="800">01 找到需求</text>
      <text x="36" y="154" fill="#66736f" font-size="18">只筛选自己能完成的网页任务</text>
    </g>
    <g transform="translate(432 222)">
      <rect width="290" height="170" rx="28" fill="#ffffff"/>
      <rect x="38" y="38" width="74" height="56" rx="12" fill="#fff4d6"/>
      <path d="M55 62h40M55 80h26" stroke="#d59616" stroke-width="7" stroke-linecap="round"/>
      <text x="36" y="124" fill="#15231f" font-size="30" font-weight="800">02 确认范围</text>
      <text x="36" y="154" fill="#66736f" font-size="18">文件、修改点、价格、截止时间</text>
    </g>
    <g transform="translate(768 222)">
      <rect width="290" height="170" rx="28" fill="#ffffff"/>
      <rect x="38" y="38" width="88" height="60" rx="12" fill="#ecf2ff"/>
      <path d="M56 58h52M56 78h34" stroke="#3662d8" stroke-width="7" stroke-linecap="round"/>
      <text x="36" y="124" fill="#15231f" font-size="30" font-weight="800">03 AI 开发</text>
      <text x="36" y="154" fill="#66736f" font-size="18">用 Codex 读文件、改代码、预览</text>
    </g>
    <g transform="translate(1104 222)">
      <rect width="290" height="170" rx="28" fill="#ffffff"/>
      <rect x="42" y="40" width="88" height="54" rx="12" fill="#eef6f2"/>
      <path d="M59 69h54M86 49v40" stroke="#0f9b74" stroke-width="7" stroke-linecap="round"/>
      <text x="36" y="124" fill="#15231f" font-size="30" font-weight="800">04 远程协作</text>
      <text x="36" y="154" fill="#66736f" font-size="18">必要时用远程桌面现场处理</text>
    </g>
    <g transform="translate(278 510)">
      <rect width="290" height="170" rx="28" fill="#ffffff"/>
      <path d="M42 50h88v66H42z" fill="#fff4d6"/>
      <path d="M42 68h88M62 50v66" stroke="#d59616" stroke-width="6"/>
      <text x="36" y="124" fill="#15231f" font-size="30" font-weight="800">05 打包交付</text>
      <text x="36" y="154" fill="#66736f" font-size="18">压缩包、说明、验收截图</text>
    </g>
    <g transform="translate(614 510)">
      <rect width="290" height="170" rx="28" fill="#ffffff"/>
      <circle cx="76" cy="68" r="34" fill="#e8f5ef"/>
      <text x="55" y="79" fill="#0f9b74" font-size="31" font-weight="900">¥</text>
      <text x="36" y="124" fill="#15231f" font-size="30" font-weight="800">06 收款复盘</text>
      <text x="36" y="154" fill="#66736f" font-size="18">确认通过后收款，记录可复制点</text>
    </g>
    <g transform="translate(950 510)">
      <rect width="290" height="170" rx="28" fill="#ffffff"/>
      <path d="M42 70l24 24 58-62" fill="none" stroke="#0f9b74" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="124" fill="#15231f" font-size="30" font-weight="800">07 保留边界</text>
      <text x="36" y="154" fill="#66736f" font-size="18">只做辅导与技术实现，不违规代写</text>
    </g>
  </g>
  <g fill="none" stroke="#9bb2aa" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12">
    <path d="M386 307h46"/>
    <path d="M722 307h46"/>
    <path d="M1058 307h46"/>
    <path d="M1249 392c-42 72-114 105-196 118"/>
    <path d="M904 595h46"/>
    <path d="M568 595h46"/>
  </g>
</svg>
